<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>归档 — 创业情报雷达</title>
  <style>
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'PingFang SC', 'Microsoft YaHei', sans-serif;
      background: linear-gradient(135deg, #0f172a 0%, #1e1b4b 50%, #312e81 100%);
      min-height: 100vh;
      display: flex; align-items: center; justify-content: center;
      color: white; text-align: center;
    }
    .box { max-width: 400px; padding: 40px 20px; }
    h1 { font-size: 1.8rem; font-weight: 800; margin-bottom: 12px; }
    h1 span { color: #a5b4fc; }
    p { color: rgba(255,255,255,0.6); margin-bottom: 28px; font-size: 0.95rem; }
    .btn {
      display: inline-block; background: #6366f1; color: white;
      padding: 12px 28px; border-radius: 10px; text-decoration: none;
      font-weight: 600; transition: background 0.2s;
    }
    .btn:hover { background: #4f46e5; }
    .note { font-size: 0.78rem; color: rgba(255,255,255,0.35); margin-top: 20px; }
  </style>
</head>
<body>
  <div class="box">
    <h1>🧠 创业情报<span>雷达</span></h1>
    <p>第一份报告正在生成中，稍后刷新即可看到归档列表。</p>
    <a class="btn" href="index.html">← 返回首页</a>
    <p class="note">报告每天北京时间 08:00 自动更新</p>
  </div>
</body>
</html>
